name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: litmus

jobs:
  typecheck-and-build:
    name: TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: litmus/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — shared
        run: npx tsc --noEmit --project shared/tsconfig.json

      - name: TypeScript — server
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: TypeScript — client
        run: npx tsc --noEmit --project client/tsconfig.json

      - name: Build client
        run: npm run build --workspace=client

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: litmus/client/dist
          retention-days: 1

  e2e:
    name: Playwright E2E (375px)
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: litmus/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: litmus/client/dist

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: litmus/client

      - name: Run E2E tests
        run: npx playwright test
        working-directory: litmus/client
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: litmus/client/playwright-report
          retention-days: 7
