name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'litmus/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: litmus

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image to ECR
        env:
          REGISTRY:   115253169289.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: litmus
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            ECR=115253169289.dkr.ecr.ap-south-1.amazonaws.com
            IMAGE=$ECR/litmus:latest

            # ── AWS credentials ──────────────────────────────────────────
            sudo mkdir -p /root/.aws
            printf '[default]\naws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}\naws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}\nregion = ap-south-1\n' \
              | sudo tee /root/.aws/credentials > /dev/null

            # ── Fix RDS security group (EC2 → RDS port 5432) ─────────────
            echo "=== Fixing RDS security group ==="
            INSTANCE_ID=$(curl -sf http://169.254.169.254/latest/meta-data/instance-id)
            EC2_SG=$(sudo aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
              --output text)
            echo "EC2 SG: $EC2_SG"

            RDS_SG=$(sudo aws rds describe-db-instances \
              --db-instance-identifier litmus-db \
              --query 'DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId' \
              --output text)
            echo "RDS SG: $RDS_SG"

            sudo aws ec2 authorize-security-group-ingress \
              --group-id "$RDS_SG" \
              --protocol tcp \
              --port 5432 \
              --source-group "$EC2_SG" 2>&1 || echo "(rule already exists — OK)"
            echo "Security group rule ensured"

            # ── Services ─────────────────────────────────────────────────
            sudo systemctl start redis6 2>/dev/null || sudo systemctl start redis 2>/dev/null || true
            sudo systemctl start docker

            # ── ECR login + pull ──────────────────────────────────────────
            sudo aws ecr get-login-password --region ap-south-1 \
              | sudo docker login --username AWS --password-stdin $ECR
            sudo docker pull $IMAGE

            # ── Write .env ────────────────────────────────────────────────
            sudo mkdir -p /opt/litmus
            sudo tee /opt/litmus/.env > /dev/null << 'ENVEOF'
            DATABASE_URL=postgresql://litmus:${{ secrets.DB_PASS }}@litmus-db.clkm64okcgml.ap-south-1.rds.amazonaws.com:5432/litmus_db?sslmode=require
            REDIS_URL=redis://127.0.0.1:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=7d
            PORT=80
            NODE_ENV=production
            CLIENT_URL=http://${{ secrets.EC2_HOST }}
            STORAGE_BACKEND=s3
            S3_BUCKET=litmus-photos-prod
            S3_REGION=ap-south-1
            S3_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}
            S3_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENVEOF

            # ── Prisma schema push ────────────────────────────────────────
            echo "=== Prisma DB push ==="
            sudo docker run --rm --network host --env-file /opt/litmus/.env $IMAGE \
              sh -c "npx prisma db push --schema=server/prisma/schema.prisma --accept-data-loss --skip-generate 2>&1"
            echo "=== Schema push done ==="

            # ── Free port 80 and start container ─────────────────────────
            sudo docker stop litmus 2>/dev/null || true
            sudo docker rm   litmus 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo docker run -d \
              --name litmus \
              --restart unless-stopped \
              --network host \
              --env-file /opt/litmus/.env \
              $IMAGE

            # ── Wait for server (handles 8-retry DB logic = up to 40s) ───
            echo "Waiting 50s for server to start..."
            sleep 50
            echo "=== Container logs ==="
            sudo docker logs litmus 2>&1
            echo "=== Container status ==="
            sudo docker ps

            if ! sudo docker ps --filter "name=litmus" --filter "status=running" | grep -q litmus; then
              echo "FATAL: container crashed — see logs above"
              exit 1
            fi

            echo "=== HTTP health check ==="
            curl -sf http://localhost/api/health && echo "APP OK" || echo "App not responding on /api/health yet"
            echo "SUCCESS — http://${{ secrets.EC2_HOST }}"
