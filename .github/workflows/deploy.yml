name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'litmus/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: litmus

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          REGISTRY:   115253169289.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: litmus
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build --progress=plain \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest .

      - name: Push image to ECR
        env:
          REGISTRY:   115253169289.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: litmus
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -ex
            ECR=115253169289.dkr.ecr.ap-south-1.amazonaws.com
            IMAGE=$ECR/litmus:latest

            echo "=== Services ==="
            sudo systemctl start redis6 2>/dev/null || sudo systemctl start redis 2>/dev/null || true
            redis-cli ping 2>/dev/null && echo "Redis OK" || echo "Redis not available (in-memory fallback)"
            sudo systemctl start docker
            sudo docker version --format '{{.Server.Version}}'

            echo "=== RDS connectivity ==="
            timeout 5 bash -c 'cat < /dev/null > /dev/tcp/litmus-db.clkm64okcgml.ap-south-1.rds.amazonaws.com/5432' \
              && echo "RDS port 5432 OPEN" \
              || echo "RDS port 5432 BLOCKED — check security group"

            echo "=== AWS auth ==="
            sudo mkdir -p /root/.aws
            printf '[default]\naws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}\naws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}\nregion = ap-south-1\n' \
              | sudo tee /root/.aws/credentials > /dev/null
            sudo aws sts get-caller-identity

            echo "=== ECR login + pull ==="
            sudo aws ecr get-login-password --region ap-south-1 \
              | sudo docker login --username AWS --password-stdin $ECR
            sudo docker pull $IMAGE

            echo "=== Write .env ==="
            sudo mkdir -p /opt/litmus
            sudo tee /opt/litmus/.env > /dev/null << 'ENVEOF'
            DATABASE_URL=postgresql://litmus:${{ secrets.DB_PASS }}@litmus-db.clkm64okcgml.ap-south-1.rds.amazonaws.com:5432/litmus_db?sslmode=require
            REDIS_URL=redis://127.0.0.1:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=7d
            PORT=80
            NODE_ENV=production
            CLIENT_URL=http://${{ secrets.EC2_HOST }}
            STORAGE_BACKEND=s3
            S3_BUCKET=litmus-photos-prod
            S3_REGION=ap-south-1
            S3_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}
            S3_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENVEOF
            echo ".env written: $(wc -l < /opt/litmus/.env) lines"

            echo "=== Prisma DB push ==="
            sudo docker run --rm --network host --env-file /opt/litmus/.env $IMAGE \
              sh -c "npx prisma db push --schema=server/prisma/schema.prisma --accept-data-loss --skip-generate 2>&1"
            echo "=== Schema push complete ==="

            echo "=== Start container ==="
            sudo docker stop litmus 2>/dev/null || true
            sudo docker rm   litmus 2>/dev/null || true
            sudo docker run -d \
              --name litmus \
              --restart always \
              --network host \
              --env-file /opt/litmus/.env \
              $IMAGE

            sleep 15
            echo "=== Container logs ==="
            sudo docker logs litmus 2>&1 || true
            echo "=== Container status ==="
            sudo docker ps

            if ! sudo docker ps --filter "name=litmus" --filter "status=running" | grep -q litmus; then
              echo "ERROR: container crashed — see logs above"
              exit 1
            fi
            echo "SUCCESS — http://${{ secrets.EC2_HOST }}"
