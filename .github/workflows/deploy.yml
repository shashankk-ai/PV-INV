name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'litmus/**'

defaults:
  run:
    working-directory: litmus

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        env:
          REGISTRY:   115253169289.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: litmus
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            ECR=115253169289.dkr.ecr.ap-south-1.amazonaws.com
            IMAGE=$ECR/litmus:latest

            # Write AWS credentials for root
            sudo mkdir -p /root/.aws
            sudo tee /root/.aws/credentials > /dev/null <<EOF
            [default]
            aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            region = ap-south-1
            EOF

            # ECR login + pull
            sudo aws ecr get-login-password --region ap-south-1 | \
              sudo docker login --username AWS --password-stdin $ECR
            sudo docker pull $IMAGE

            # Update CLIENT_URL in .env
            sudo sed -i 's|CLIENT_URL=.*|CLIENT_URL=http://${{ secrets.EC2_HOST }}|' /opt/litmus/.env

            # Restart container on port 80 (migrations run automatically on startup)
            sudo docker stop litmus 2>/dev/null || true
            sudo docker rm   litmus 2>/dev/null || true
            sudo docker run -d \
              --name litmus \
              --restart always \
              --env-file /opt/litmus/.env \
              -p 80:3001 \
              $IMAGE

            echo "Live at http://${{ secrets.EC2_HOST }}"
