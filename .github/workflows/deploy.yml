name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'litmus/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: litmus

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image to ECR
        env:
          REGISTRY:   115253169289.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: litmus
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            ECR=115253169289.dkr.ecr.ap-south-1.amazonaws.com
            IMAGE=$ECR/litmus:latest
            PASS=0; FAIL=0
            ok()   { echo "  [OK] $1"; PASS=$((PASS+1)); }
            fail() { echo "  [FAIL] $1"; FAIL=$((FAIL+1)); }

            # ── AWS credentials ────────────────────────────────────────────
            echo "--- AWS credentials ---"
            sudo mkdir -p /root/.aws
            printf '[default]\naws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}\naws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}\nregion = ap-south-1\n' \
              | sudo tee /root/.aws/credentials > /dev/null
            sudo aws sts get-caller-identity > /dev/null 2>&1 && ok "AWS auth" || fail "AWS auth"

            # ── RDS connectivity (tells us if SG is open) ──────────────────
            echo "--- RDS connectivity ---"
            timeout 5 bash -c 'cat < /dev/null > /dev/tcp/litmus-db.clkm64okcgml.ap-south-1.rds.amazonaws.com/5432' 2>/dev/null \
              && ok "RDS port 5432 OPEN" || fail "RDS port 5432 BLOCKED — add inbound rule in AWS console"

            # ── Services ───────────────────────────────────────────────────
            echo "--- Services ---"
            sudo systemctl start redis6 2>/dev/null || sudo systemctl start redis 2>/dev/null || true
            sudo systemctl start docker 2>/dev/null && ok "Docker" || fail "Docker"

            # ── ECR login + pull ───────────────────────────────────────────
            echo "--- ECR ---"
            sudo aws ecr get-login-password --region ap-south-1 \
              | sudo docker login --username AWS --password-stdin $ECR > /dev/null 2>&1 \
              && ok "ECR login" || fail "ECR login"
            sudo docker pull $IMAGE > /dev/null 2>&1 && ok "Image pull" || fail "Image pull"

            # ── Write .env ─────────────────────────────────────────────────
            echo "--- .env ---"
            sudo mkdir -p /opt/litmus
            sudo tee /opt/litmus/.env > /dev/null << 'ENVEOF'
            DATABASE_URL=postgresql://litmus:${{ secrets.DB_PASS }}@litmus-db.clkm64okcgml.ap-south-1.rds.amazonaws.com:5432/litmus_db?sslmode=require
            REDIS_URL=redis://127.0.0.1:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=7d
            PORT=80
            NODE_ENV=production
            CLIENT_URL=http://${{ secrets.EC2_HOST }}
            STORAGE_BACKEND=s3
            S3_BUCKET=litmus-photos-prod
            S3_REGION=ap-south-1
            S3_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}
            S3_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENVEOF
            ok ".env written ($(wc -l < /opt/litmus/.env) lines)"

            # ── Prisma push ────────────────────────────────────────────────
            echo "--- Prisma DB push ---"
            sudo docker run --rm --network host --env-file /opt/litmus/.env $IMAGE \
              sh -c "npx prisma db push --schema=server/prisma/schema.prisma --accept-data-loss --skip-generate 2>&1" \
              && ok "Prisma push" || fail "Prisma push (DB likely not reachable)"

            # ── Start container ────────────────────────────────────────────
            echo "--- Container ---"
            sudo docker stop litmus 2>/dev/null || true
            sudo docker rm   litmus 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo docker run -d \
              --name litmus \
              --restart unless-stopped \
              --network host \
              --env-file /opt/litmus/.env \
              $IMAGE > /dev/null 2>&1 && ok "Container started" || fail "Container start"

            # ── Wait for server (8 retries x 5s = 40s) ────────────────────
            echo "--- Waiting 50s for server to initialise ---"
            sleep 50

            # ── Logs ───────────────────────────────────────────────────────
            echo "--- Container logs ---"
            sudo docker logs litmus 2>&1 | tail -30

            # ── Health ─────────────────────────────────────────────────────
            echo "--- Health ---"
            sudo docker ps --filter "name=litmus" --filter "status=running" | grep -q litmus \
              && ok "Container running" || fail "Container NOT running"

            # ── Summary ────────────────────────────────────────────────────
            echo ""
            echo "======================================="
            echo " PASSED: $PASS   FAILED: $FAIL"
            echo "======================================="
            [ "$FAIL" -eq 0 ] && echo "SUCCESS — http://${{ secrets.EC2_HOST }}" || exit 1
