name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'litmus/**'

defaults:
  run:
    working-directory: litmus

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        env:
          REGISTRY:   115253169289.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: litmus
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            # Write deploy script with embedded credentials
            sudo tee /opt/litmus/deploy.sh > /dev/null << 'DEPLOY'
            #!/bin/bash
            set -e
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_DEFAULT_REGION=ap-south-1
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin 115253169289.dkr.ecr.ap-south-1.amazonaws.com
            docker pull 115253169289.dkr.ecr.ap-south-1.amazonaws.com/litmus:latest
            docker stop litmus 2>/dev/null || true
            docker rm litmus 2>/dev/null || true
            docker run -d \
              --name litmus \
              --restart always \
              --env-file /opt/litmus/.env \
              -p 3001:3001 \
              115253169289.dkr.ecr.ap-south-1.amazonaws.com/litmus:latest
            echo "Deploy complete"
            DEPLOY
            sudo chmod +x /opt/litmus/deploy.sh
            sudo AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
                 AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
                 AWS_DEFAULT_REGION=ap-south-1 \
                 /opt/litmus/deploy.sh
